name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 0 点自动刷新
  workflow_dispatch:        # 也支持手动触发
  push:
    branches:
      - main

# 让 GITHUB_TOKEN 有写权限，才能 push 到 output 分支
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake game from contributions
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8B7CF6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
